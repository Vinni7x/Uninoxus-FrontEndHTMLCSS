<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uninoxus — Dashboard do Professor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-info">
      <h1 id="professor-nome">Carregando...</h1>
      <p id="professor-curso">—</p>
    </div>
  </header>

  <main class="main">

    <section>
      <h2 class="section-title">Turmas Ministradas</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Componente Curricular</th>
              <th>Local</th>
              <th>Horário</th>
              <th>Dias da Semana</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="turmas-tbody">
            <tr><td colspan="6" class="state-msg">Carregando turmas...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 class="section-title">Provas</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Disciplina</th>
              <th>Descrição</th>
              <th>Tipo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="provas-tbody">
            <tr><td colspan="5" class="state-msg">Carregando provas...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  

  </main>

  <script src="dashboard-professor.js"></script>
</body>
</html>
